# ~/.pinaivu/config.toml
# Generated by `pinaivu init`. Edit as needed.

[node]
node_id   = ""                  # auto-populated on first run from libp2p keypair
data_dir  = "~/.pinaivu/data"
log_level = "info"              # trace | debug | info | warn | error

[gpu]
device          = "auto"        # auto | cuda:0 | cuda:1 | metal | cpu
max_vram_usage  = 0.9           # fraction of total VRAM to use (0.0–1.0)
concurrent_jobs = 1             # max parallel inference jobs on this GPU

[inference]
engine              = "ollama"
default_model       = "llama3.1:8b"
max_context_length  = 8192
max_output_tokens   = 4096
temperature_default = 0.7

[network]
listen_port  = 7771
bootstrap_nodes = [
  "/ip4/13.48.204.156/tcp/4001/p2p/12D3KooWBoxCVGU2BpCYLqDN27AtyAtXJyY6MeCRssSARYL4NnU9",
]
max_peers     = 50
nat_traversal = true

[pricing]
price_per_1k_tokens = 10        # lamports per 1 000 output tokens (Solana mode)
min_escrow          = 100
auto_pricing        = false

[wallet]
address  = ""
keystore = "~/.pinaivu/wallet.enc"

[privacy]
memory_wipe = true
tee_enabled = false

[health]
metrics_port       = 9090
heartbeat_interval = "30s"

[updates]
auto_update    = true
update_channel = "stable"       # stable | beta | nightly

# ---------------------------------------------------------------------------
# Settlement adapters — OPTIONAL, ordered by preference.
#
# "free" is always the last-resort fallback and does not need to be listed.
# Add adapters below to enable paid inference modes.
#
# The system runs fully without any adapters here (free / P2P-only mode).
# ---------------------------------------------------------------------------

# ── No payment (default — always present even if this block is absent) ──────
[[settlement.adapters]]
id           = "free"
price_per_1k = 0

# ── Off-chain signed receipts (no blockchain required) ──────────────────────
# [[settlement.adapters]]
# id           = "receipt"
# price_per_1k = 5

# ── Solana — on-chain SOL escrow via the pinaivu Anchor program ─────────────
# Requires binary compiled with:  cargo build --features solana
#
# Steps:
#   1. Deploy: anchor build && anchor deploy --provider.cluster devnet
#   2. Copy the program ID from `anchor keys list`
#   3. Export your node keypair:
#        solana-keygen show --outfile /dev/stdout | xxd -p -c 64
#   4. Get your P2P pubkey:  pinaivu status  (shows node_pubkey_hex)
#
# [[settlement.adapters]]
# id               = "solana"
# rpc_url          = "https://api.devnet.solana.com"
# contract_address = "PiNaivuXXX..."   # program ID from `anchor keys list`
# price_per_1k     = 10
# token_id         = "sol"
# signer_key_hex   = ""                # 64-byte keypair hex (seed || pubkey)
# node_pubkey_hex  = ""                # 32-byte Ed25519 P2P pubkey hex

# ── Sui — Move escrow contracts ─────────────────────────────────────────────
# [[settlement.adapters]]
# id               = "sui"
# rpc_url          = "https://fullnode.mainnet.sui.io"
# package_id       = "0xABC..."
# contract_address = "0xDEF..."        # treasury shared-object address
# price_per_1k     = 10
# signer_key_hex   = ""                # 32-byte Ed25519 seed hex

# ── EVM (Base, Arbitrum, Ethereum, …) ───────────────────────────────────────
# [[settlement.adapters]]
# id               = "evm-8453"        # "evm-" + chain ID
# rpc_url          = "https://mainnet.base.org"
# contract_address = "0xABC..."
# chain_id         = 8453
# price_per_1k     = 10
# signer_key_hex   = ""                # 32-byte secp256k1 private key hex
